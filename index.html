<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NZRAB NPE — Module Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #f5f2ec;
      --ink:          #0f0f0f;
      --ink-dim:      #6b6b6b;
      --accent:       #c8401a;
      --accent-light: rgba(200, 64, 26, 0.08);
      --green:        #10b981;
      --green-light:  rgba(16, 185, 129, 0.08);
      --green-border: rgba(16, 185, 129, 0.22);
      --surface:      #ffffff;
      --border:       rgba(15, 15, 15, 0.10);
      --border-dark:  rgba(15, 15, 15, 0.18);
      --grid-color:   rgba(15, 15, 15, 0.055);
      --sidebar-w:    280px;
      --radius:       8px;
      --header-h:     56px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      color: var(--ink);
      background-color: var(--bg);
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 24px 24px;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245, 242, 236, 0.94);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      height: var(--header-h);
    }

    .header-logo {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
      user-select: none;
    }

    .header-sep {
      width: 1px;
      height: 18px;
      background: var(--border-dark);
      flex-shrink: 0;
    }

    /* Candidate tabs */
    .tabs { display: flex; gap: 4px; }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid transparent;
      background: none;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-dim);
      transition: color 0.15s, background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .tab:hover { color: var(--ink); background: var(--accent-light); }
    .tab.active {
      color: var(--ink);
      border-color: var(--border-dark);
      background: var(--surface);
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .tab-badge {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      padding: 1px 7px;
      border-radius: 10px;
      color: white;
      background: var(--ink-dim);
      transition: background 0.2s;
    }
    .tab.active .tab-badge { background: var(--accent); }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border-dark);
      background: var(--surface);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      transition: border-color 0.15s, box-shadow 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .btn-primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .btn-primary:hover { opacity: 0.88; border-color: var(--accent); box-shadow: none; }

    /* ── Layout ─────────────────────────────────────────── */
    .app-layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: calc(100vh - var(--header-h));
      align-items: start;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    aside {
      position: sticky;
      top: var(--header-h);
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      border-right: 1px solid var(--border);
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(245, 242, 236, 0.60);
    }

    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-thumb { background: rgba(15,15,15,0.12); border-radius: 2px; }

    .s-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 14px;
    }

    .s-label {
      font-family: 'DM Mono', monospace;
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: 10px;
    }

    /* Big % */
    .pct-big {
      font-family: 'DM Mono', monospace;
      font-size: 40px;
      font-weight: 400;
      line-height: 1;
      color: var(--ink);
      transition: color 0.3s;
    }
    .pct-sub {
      font-size: 12px;
      color: var(--ink-dim);
      margin-top: 5px;
    }
    .bar-wrap {
      height: 5px;
      background: rgba(15,15,15,0.09);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 12px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
    }

    /* Competency bars */
    .comp-list { display: flex; flex-direction: column; gap: 9px; }
    .comp-item { display: flex; flex-direction: column; gap: 3px; }
    .comp-row-head { display: flex; justify-content: space-between; align-items: baseline; }
    .comp-name { font-size: 11.5px; font-weight: 500; color: var(--ink); }
    .comp-frac {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--ink-dim);
    }
    .comp-bar-wrap { height: 3px; background: rgba(15,15,15,0.09); border-radius: 2px; overflow: hidden; }
    .comp-bar-fill { height: 100%; border-radius: 2px; transition: width 0.45s cubic-bezier(0.4,0,0.2,1); }

    /* Readiness */
    .readiness-label { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
    .readiness-desc  { font-size: 12px; color: var(--ink-dim); line-height: 1.5; }

    /* ── Main ─────────────────────────────────────────────── */
    main { padding: 18px 22px 40px; }

    /* Filter chips */
    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-dim);
      transition: color 0.12s, background 0.12s, border-color 0.12s;
      user-select: none;
    }
    .chip:hover { color: var(--ink); border-color: var(--border-dark); }
    .chip.active { background: var(--accent); color: white; border-color: var(--accent); }

    .chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .chip-n {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      opacity: 0.70;
    }

    /* Module groups */
    .module-group { margin-bottom: 22px; }

    .group-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 7px;
      margin-bottom: 7px;
      border-bottom: 1px solid var(--border);
    }
    .group-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .group-name {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }
    .group-frac {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink-dim);
      margin-left: auto;
    }

    /* Cards */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    .module-card {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 5px;
      cursor: pointer;
      transition: border-color 0.13s, background 0.13s, box-shadow 0.13s;
      animation: fadeIn 0.28s ease both;
      animation-delay: var(--delay, 0ms);
    }
    .module-card:hover {
      border-color: var(--border-dark);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .module-card.done {
      background: var(--green-light);
      border-color: var(--green-border);
    }

    /* Check circle */
    .check-ring {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border-dark);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .module-card.done .check-ring {
      background: var(--green);
      border-color: var(--green);
    }
    .check-ring svg { display: none; }
    .module-card.done .check-ring svg { display: block; }

    /* Module info */
    .mod-info { flex: 1; min-width: 0; }
    .mod-pn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--ink-dim);
      margin-bottom: 1px;
    }
    .mod-name {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.13s;
    }
    .module-card.done .mod-name {
      text-decoration: line-through;
      color: var(--ink-dim);
    }

    .mod-meta { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .mod-dur {
      font-family: 'DM Mono', monospace;
      font-size: 10.5px;
      color: var(--ink-dim);
    }
    .mod-cat-dot { width: 7px; height: 7px; border-radius: 50%; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 48px 0;
      color: var(--ink-dim);
      font-size: 14px;
    }

    /* ── Modal ─────────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.38);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      width: min(660px, calc(100vw - 40px));
      max-height: calc(100vh - 40px);
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18);
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-close {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: none;
      background: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-dim);
      font-size: 20px;
      line-height: 1;
    }
    .modal-close:hover { background: rgba(15,15,15,0.06); color: var(--ink); }
    .modal-body { flex: 1; overflow-y: auto; padding: 16px 18px; }
    .modal-foot {
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    #summary-pre {
      font-family: 'DM Mono', monospace;
      font-size: 11.5px;
      line-height: 1.75;
      white-space: pre-wrap;
      color: var(--ink);
      background: rgba(15,15,15,0.025);
      padding: 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    /* ── Toast ─────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 22px;
      right: 22px;
      background: var(--ink);
      color: white;
      padding: 9px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      z-index: 300;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.18s, transform 0.18s;
      pointer-events: none;
      max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Scrollbars ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(15,15,15,0.13); border-radius: 3px; }
  </style>
</head>

<!-- ── Weekly Summary Modal ─────────────────────────────── -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">

  </div>
</div>

  { id: 'pn_7.102',  pn: 'pn_7.102',  name: 'Agreement for Sub-consultant Services',                   categoryId: 'legal',    dur: 5  },
  { id: 'pn_7.103',  pn: 'pn_7.103',  name: 'Agreement for Separate Consultant Services',              categoryId: 'legal',    dur: 5  },
  { id: 'pn_9.101',  pn: 'pn_9.101',  name: 'Building Act — Consents',                                 categoryId: 'legal',    dur: 6  },
  { id: 'pn_9.102',  pn: 'pn_9.102',  name: 'Building Act — Code Compliance Certificates',             categoryId: 'legal',    dur: 6  },
  { id: 'pn_9.106',  pn: 'pn_9.106',  name: 'Producer Statements',                                     categoryId: 'legal',    dur: 5  },

  // ── 07 Health & Safety (3) ───────────────────────────────
  { id: 'pn_1.219',  pn: 'pn_1.219',  name: 'Health and Safety at Work Act 2015',                      categoryId: 'hs',       dur: 5  },
  { id: 'pn_1.221',  pn: 'pn_1.221',  name: 'Safety in On-Site Observation',                           categoryId: 'hs',       dur: 5  },
  { id: 'pn_1.223',  pn: 'pn_1.223',  name: 'Seismic Considerations — EPBs',                           categoryId: 'hs',       dur: 5  },
];

const READINESS = [
  [0,  'Not Started',        'Begin with any category to build momentum.'],
  [1,  'In Progress',        'Keep going — every module counts.'],
  [33, 'Building Momentum',  'You\'re making solid progress across the material.'],
  [66, 'Strong Foundation',  'Major topics covered — focus on weak areas now.'],
  [90, 'Exam Ready',         'Outstanding coverage. Do a final review pass.'],
];

const TOTAL = MODULES.length; // 43

// ── State ──────────────────────────────────────────────────

const LS_KEY = 'nzrab-tracker-v1';
let activeCandidate = 'amelia';
let activeFilter    = 'all';
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return blank();
    const p = JSON.parse(raw);
    return {
      amelia:    { completed: new Set(p.amelia?.completed    || []) },
      matamoana: { completed: new Set(p.matamoana?.completed || []) },
    };
  } catch { return blank(); }
}
function blank() {
  return { amelia: { completed: new Set() }, matamoana: { completed: new Set() } };
}
function saveState() {
  const s = {
    amelia:    { completed: [...state.amelia.completed]    },
    matamoana: { completed: [...state.matamoana.completed] },
  };
  localStorage.setItem(LS_KEY, JSON.stringify(s));
}

// ── Derived helpers ────────────────────────────────────────

function completed() { return state[activeCandidate].completed; }
function pct(c) { return Math.round((state[c].completed.size / TOTAL) * 100); }

function competencyStats(c) {
  const done = state[c].completed;
  return COMPETENCIES.map(comp => {
    const catIds = CATEGORIES.filter(cat => cat.competency === comp.id).map(cat => cat.id);
    const total  = MODULES.filter(m => catIds.includes(m.categoryId)).length;
    const n      = MODULES.filter(m => catIds.includes(m.categoryId) && done.has(m.id)).length;
    return { ...comp, total, done: n, p: total ? Math.round((n / total) * 100) : 0 };
  });
}

function readinessFor(p) {
  let row = READINESS[0];
  for (const r of READINESS) { if (p >= r[0]) row = r; }
  return row;
}

function weakest(c) {
  const stats = competencyStats(c);
  return stats.reduce((a, b) => b.p < a.p ? b : a);
}

function nextModules(c, n = 5) {
  const done = state[c].completed;
  return MODULES.filter(m => !done.has(m.id)).slice(0, n);
}

// ── Render ─────────────────────────────────────────────────

function renderAll() {
  renderTabs();
  renderSidebar();
  renderFilters();
  renderModuleList();
}

function renderTabs() {
  for (const c of ['amelia', 'matamoana']) {
    const tab = document.querySelector(`[data-c="${c}"]`);
    tab.className = 'tab' + (c === activeCandidate ? ' active' : '');
    document.getElementById(`badge-${c}`).textContent = pct(c) + '%';
  }
}

function renderSidebar() {
  const p = pct(activeCandidate);
  const n = state[activeCandidate].completed.size;
  document.getElementById('pct-big').textContent      = p + '%';
  document.getElementById('pct-sub').textContent      = `${n} of ${TOTAL} modules complete`;
  document.getElementById('bar-overall').style.width  = p + '%';

  // Competency bars
  const stats = competencyStats(activeCandidate);
  document.getElementById('comp-list').innerHTML = stats.map(s => `
    <div class="comp-item">
      <div class="comp-row-head">
        <span class="comp-name">${s.id}</span>
        <span class="comp-frac">${s.done}/${s.total}</span>
      </div>
      <div class="comp-bar-wrap">
        <div class="comp-bar-fill" style="width:${s.p}%;background:${s.colour}"></div>
      </div>
    </div>
  `).join('');

  // Readiness
  const [, label, desc] = readinessFor(p);
  document.getElementById('readiness-label').textContent = label;
  document.getElementById('readiness-desc').textContent  = desc;
}

function renderFilters() {
  const done = state[activeCandidate].completed;
  const pending = TOTAL - done.size;

  const chips = [
    { id: 'all',       label: 'All',       count: TOTAL,       colour: null },
    { id: 'pending',   label: 'Pending',   count: pending,     colour: null },
    { id: 'completed', label: 'Completed', count: done.size,   colour: null },
    ...CATEGORIES.map(c => ({
      id: c.id, label: c.label,
      count: MODULES.filter(m => m.categoryId === c.id).length,
      colour: c.colour,
    })),
  ];

  document.getElementById('filters').innerHTML = chips.map(ch => {
    const dot = ch.colour ? `<span class="chip-dot" style="background:${ch.colour}"></span>` : '';
    return `<button class="chip${ch.id === activeFilter ? ' active' : ''}" onclick="setFilter('${ch.id}')">
      ${dot}${ch.label}<span class="chip-n">${ch.count}</span>
    </button>`;
  }).join('');
}

function renderModuleList() {
  const done = state[activeCandidate].completed;

  const filtered = MODULES.filter(m => {
    if (activeFilter === 'completed') return done.has(m.id);
    if (activeFilter === 'pending')   return !done.has(m.id);
    if (activeFilter === 'all')       return true;
    return m.categoryId === activeFilter;
  });

  if (!filtered.length) {
    document.getElementById('module-list').innerHTML =
      `<div class="empty">No modules match this filter.</div>`;
    return;
  }

  // Group by category in original order
  const groups = new Map();
  for (const cat of CATEGORIES) groups.set(cat.id, []);
  for (const m of filtered) groups.get(m.categoryId).push(m);

  let i = 0;
  const html = [...groups.entries()]
    .filter(([, mods]) => mods.length)
    .map(([catId, mods]) => {
      const cat     = CATEGORIES.find(c => c.id === catId);
      const catDone = mods.filter(m => done.has(m.id)).length;

      const cards = mods.map(m => {
        const isDone = done.has(m.id);
        const delay  = `${i++ * 28}ms`;
        return `<div class="module-card${isDone ? ' done' : ''}"
                     style="--delay:${delay}"
                     onclick="toggleModule('${m.id}')"
                     title="${m.name}">
          <div class="check-ring">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none"
                 stroke="white" stroke-width="3.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20,6 9,17 4,12"/>
            </svg>
          </div>
          <div class="mod-info">
            <div class="mod-pn">${m.pn}</div>
            <div class="mod-name">${m.name}</div>
          </div>
          <div class="mod-meta">
            <span class="mod-dur">~${m.dur} min</span>
            <span class="mod-cat-dot" style="background:${cat.colour}"></span>
          </div>
        </div>`;
      }).join('');

      return `<div class="module-group">
        <div class="group-head">
          <span class="group-dot" style="background:${cat.colour}"></span>
          <span class="group-name">${cat.label}</span>
          <span class="group-frac">${catDone}/${mods.length}</span>
        </div>
        ${cards}
      </div>`;
    }).join('');

  document.getElementById('module-list').innerHTML = html;
}

// ── Actions ────────────────────────────────────────────────

function switchCandidate(c) {
  activeCandidate = c;
  renderAll();
}

function setFilter(f) {
  activeFilter = f;
  renderFilters();
  renderModuleList();
}

function toggleModule(id) {
  const set = state[activeCandidate].completed;
  if (set.has(id)) { set.delete(id); } else { set.add(id); }
  saveState();
  renderTabs();
  renderSidebar();
  renderFilters();
  renderModuleList();
  const m   = MODULES.find(m => m.id === id);
  const msg = set.has(id) ? `Marked complete: ${m.name}` : `Unmarked: ${m.name}`;
  showToast(msg);
}

// ── Toast ──────────────────────────────────────────────────

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// ── Weekly Summary ─────────────────────────────────────────

function generateSummary() {
  const name  = activeCandidate === 'amelia' ? 'Amelia' : 'Matamoana';
  const p     = pct(activeCandidate);
  const n     = state[activeCandidate].completed.size;
  const stats = competencyStats(activeCandidate);
  const weak  = weakest(activeCandidate);
  const next5 = nextModules(activeCandidate, 5);
  const date  = new Date().toLocaleDateString('en-NZ', { day: 'numeric', month: 'long', year: 'numeric' });

  function bar(pct) {
    const f = Math.round(pct / 10);
    return '\u2588'.repeat(f) + '\u2591'.repeat(10 - f);
  }
  function rpad(s, n) { return s + ' '.repeat(Math.max(0, n - s.length)); }

  const compLines = stats
    .map(s => `  ${rpad(s.id, 26)} ${bar(s.p)} ${String(s.p).padStart(3)}%`)
    .join('\n');

  const nextLines = next5.length
    ? next5.map((m, i) => `  ${i + 1}. ${m.pn} — ${m.name}`).join('\n')
    : '  (All modules complete!)';

  const startWith = next5.length ? next5[0].name : 'a final review of key topics';

  const text =
`NZRAB NPE \u2014 Weekly Summary
Candidate: ${name} | Date: ${date}

Overall Progress: ${n}/${TOTAL} (${p}%)

Competency Coverage:
${compLines}

\u26a0 Weakest area: ${weak.id} (${weak.p}%)

Next ${Math.min(5, next5.length)} modules to study:
${nextLines}

---
[STUDY] You are a study coach for the NZRAB NPE exam. I will give you practice note topics and you will quiz me, explain concepts, and help me identify gaps. Start with: ${startWith}`;

  document.getElementById('summary-pre').textContent = text;
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

async function copyToClipboard() {
  const text = document.getElementById('summary-pre').textContent;
  try {
    await navigator.clipboard.writeText(text);
    showToast('Copied to clipboard');
  } catch {
    showToast('Copy failed — select all text and copy manually');
  }
}

// ── Auto-save ──────────────────────────────────────────────

setInterval(saveState, 60_000);

// ── Init ───────────────────────────────────────────────────

renderAll();
</script>
