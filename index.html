<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NZRAB NPE — Module Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg:           #f5f2ec;
      --ink:          #0f0f0f;
      --ink-dim:      #6b6b6b;
      --accent:       #c8401a;
      --accent-light: rgba(200, 64, 26, 0.08);
      --green:        #10b981;
      --green-light:  rgba(16, 185, 129, 0.08);
      --green-border: rgba(16, 185, 129, 0.22);
      --surface:      #ffffff;
      --border:       rgba(15, 15, 15, 0.10);
      --border-dark:  rgba(15, 15, 15, 0.18);
      --grid-color:   rgba(15, 15, 15, 0.055);
      --sidebar-w:    280px;
      --radius:       8px;
      --header-h:     56px;
      --player-h:     64px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      color: var(--ink);
      background-color: var(--bg);
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 24px 24px;
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245, 242, 236, 0.94);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex; align-items: center; gap: 14px;
      height: var(--header-h);
    }
    .header-logo {
      font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
      letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--accent); white-space: nowrap; user-select: none;
    }
    .header-sep { width: 1px; height: 18px; background: var(--border-dark); flex-shrink: 0; }
    .tabs { display: flex; gap: 4px; }
    .tab {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 14px; border-radius: 20px; border: 1px solid transparent;
      background: none; cursor: pointer; font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 500; color: var(--ink-dim);
      transition: color 0.15s, background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .tab:hover { color: var(--ink); background: var(--accent-light); }
    .tab.active { color: var(--ink); border-color: var(--border-dark); background: var(--surface); box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .tab-badge {
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
      padding: 1px 7px; border-radius: 10px; color: white;
      background: var(--ink-dim); transition: background 0.2s;
    }
    .tab.active .tab-badge { background: var(--accent); }
    .header-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border-dark);
      background: var(--surface); cursor: pointer; font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 500; color: var(--ink);
      transition: border-color 0.15s, box-shadow 0.15s, opacity 0.15s; white-space: nowrap;
    }
    .btn:hover { border-color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-primary:hover { opacity: 0.88; border-color: var(--accent); box-shadow: none; }
    .btn-ghost { border-color: transparent; background: none; color: var(--ink-dim); padding: 6px 10px; }
    .btn-ghost:hover { background: var(--accent-light); border-color: transparent; box-shadow: none; color: var(--ink); }

    /* ── Layout ────────────────────────────────────────────── */
    .app-layout {
      display: grid; grid-template-columns: var(--sidebar-w) 1fr;
      min-height: calc(100vh - var(--header-h)); align-items: start;
    }

    /* ── Sidebar ───────────────────────────────────────────── */
    aside {
      position: sticky; top: var(--header-h); height: calc(100vh - var(--header-h));
      overflow-y: auto; border-right: 1px solid var(--border);
      padding: 18px 14px; display: flex; flex-direction: column; gap: 12px;
      background: rgba(245, 242, 236, 0.60);
    }
    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-thumb { background: rgba(15,15,15,0.12); border-radius: 2px; }
    .s-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 14px; }
    .s-label {
      font-family: 'DM Mono', monospace; font-size: 9.5px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 10px;
    }
    .pct-big { font-family: 'DM Mono', monospace; font-size: 40px; font-weight: 400; line-height: 1; color: var(--ink); }
    .pct-sub { font-size: 12px; color: var(--ink-dim); margin-top: 5px; }
    .bar-wrap { height: 5px; background: rgba(15,15,15,0.09); border-radius: 3px; overflow: hidden; margin-top: 12px; }
    .bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.45s cubic-bezier(0.4,0,0.2,1); }
    .comp-list { display: flex; flex-direction: column; gap: 9px; }
    .comp-item { display: flex; flex-direction: column; gap: 3px; }
    .comp-row-head { display: flex; justify-content: space-between; align-items: baseline; }
    .comp-name { font-size: 11.5px; font-weight: 500; color: var(--ink); }
    .comp-frac { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-dim); }
    .comp-bar-wrap { height: 3px; background: rgba(15,15,15,0.09); border-radius: 2px; overflow: hidden; }
    .comp-bar-fill { height: 100%; border-radius: 2px; transition: width 0.45s cubic-bezier(0.4,0,0.2,1); }
    .readiness-label { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
    .readiness-desc  { font-size: 12px; color: var(--ink-dim); line-height: 1.5; }

    /* ── Main ──────────────────────────────────────────────── */
    main { padding: 18px 22px 40px; transition: padding-bottom 0.2s; }
    .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--surface); cursor: pointer; font-family: 'Outfit', sans-serif;
      font-size: 12px; font-weight: 500; color: var(--ink-dim);
      transition: color 0.12s, background 0.12s, border-color 0.12s; user-select: none;
    }
    .chip:hover { color: var(--ink); border-color: var(--border-dark); }
    .chip.active { background: var(--accent); color: white; border-color: var(--accent); }
    .chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .chip-n   { font-family: 'DM Mono', monospace; font-size: 10px; opacity: 0.70; }
    .module-group { margin-bottom: 22px; }
    .group-head { display: flex; align-items: center; gap: 8px; padding-bottom: 7px; margin-bottom: 7px; border-bottom: 1px solid var(--border); }
    .group-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .group-name { font-size: 12px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--ink-dim); }
    .group-frac { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-dim); margin-left: auto; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .module-card {
      display: flex; align-items: center; gap: 11px;
      padding: 9px 12px; border-radius: var(--radius); border: 1px solid var(--border);
      background: var(--surface); margin-bottom: 5px; cursor: pointer;
      transition: border-color 0.13s, background 0.13s, box-shadow 0.13s;
      animation: fadeIn 0.28s ease both; animation-delay: var(--delay, 0ms);
    }
    .module-card:hover { border-color: var(--border-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .module-card.done { background: var(--green-light); border-color: var(--green-border); }
    .module-card.now-playing { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .check-ring {
      width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border-dark);
      background: var(--bg); display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, border-color 0.15s;
    }
    .module-card.done .check-ring { background: var(--green); border-color: var(--green); }
    .check-ring svg { display: none; }
    .module-card.done .check-ring svg { display: block; }
    .mod-info { flex: 1; min-width: 0; }
    .mod-pn   { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-dim); margin-bottom: 1px; }
    .mod-name { font-size: 13.5px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.13s; }
    .module-card.done .mod-name { text-decoration: line-through; color: var(--ink-dim); }
    .mod-meta { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .mod-dur  { font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--ink-dim); }
    .mod-cat-dot { width: 7px; height: 7px; border-radius: 50%; }

    .empty { text-align: center; padding: 48px 0; color: var(--ink-dim); font-size: 14px; }

    /* ── Play button on card ───────────────────────────────── */
    .play-btn {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid var(--border-dark); background: var(--surface);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--ink-dim);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .play-btn:hover  { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
    .play-btn.is-playing { background: var(--accent); border-color: var(--accent); color: white; }
    .play-btn.no-audio   { opacity: 0.35; cursor: default; }

    /* ── Player bar ─────────────────────────────────────────── */
    #player-bar {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      height: 64px; background: var(--ink); color: white;
      align-items: center; gap: 16px; padding: 0 20px;
      z-index: 150; box-shadow: 0 -2px 16px rgba(0,0,0,0.20);
    }
    .pb-info  { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
    .pb-pn    { font-family: 'DM Mono', monospace; font-size: 9.5px; opacity: 0.55; }
    .pb-name  { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pb-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .pb-btn   { width: 32px; height: 32px; border-radius: 50%; border: none; background: rgba(255,255,255,0.10); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .pb-btn:hover { background: rgba(255,255,255,0.20); }
    .pb-btn-main { width: 38px; height: 38px; background: white; color: var(--ink); }
    .pb-btn-main:hover { opacity: 0.90; background: white; }
    .pb-progress { display: flex; align-items: center; gap: 9px; flex: 1; max-width: 420px; }
    .pb-time  { font-family: 'DM Mono', monospace; font-size: 11px; opacity: 0.55; white-space: nowrap; min-width: 36px; }
    .pb-time.right { text-align: right; }
    .pb-seek  { flex: 1; -webkit-appearance: none; appearance: none; height: 3px; border-radius: 2px; background: linear-gradient(to right, rgba(255,255,255,0.7) var(--prog,0%), rgba(255,255,255,0.18) var(--prog,0%)); outline: none; cursor: pointer; }
    .pb-seek::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: white; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .pb-close { width: 28px; height: 28px; border-radius: 50%; border: none; background: rgba(255,255,255,0.10); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; line-height: 1; flex-shrink: 0; transition: background 0.15s; }
    .pb-close:hover { background: rgba(255,255,255,0.22); }

    /* ── Modal ──────────────────────────────────────────────── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.38); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); width: min(660px, calc(100vw - 40px)); max-height: calc(100vh - 40px); display: flex; flex-direction: column; box-shadow: 0 24px 60px rgba(0,0,0,0.18); }
    .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-close { width: 28px; height: 28px; border-radius: 6px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink-dim); font-size: 20px; line-height: 1; }
    .modal-close:hover { background: rgba(15,15,15,0.06); color: var(--ink); }
    .modal-body { flex: 1; overflow-y: auto; padding: 16px 18px; }
    .modal-foot { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    #summary-pre { font-family: 'DM Mono', monospace; font-size: 11.5px; line-height: 1.75; white-space: pre-wrap; color: var(--ink); background: rgba(15,15,15,0.025); padding: 14px; border-radius: 6px; border: 1px solid var(--border); }

    /* ── Toast ──────────────────────────────────────────────── */
    #toast { position: fixed; bottom: 82px; right: 22px; background: var(--ink); color: white; padding: 9px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; z-index: 300; opacity: 0; transform: translateY(6px); transition: opacity 0.18s, transform 0.18s; pointer-events: none; max-width: 320px; }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Scrollbars ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(15,15,15,0.13); border-radius: 3px; }
  </style>
</head>

<!-- ── App ──────────────────────────────────────────────── -->
<div id="app">

    <div class="header-actions">

          <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
          <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>

      <button class="btn" onclick="generateSummary()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Weekly Summary
      </button>
      <button class="btn btn-primary" onclick="saveState(); showToast('Progress saved')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
        Save
      </button>
    </div>
  </header>

  <div class="app-layout">
    <aside>
      <div class="s-card">
        <div class="s-label">Overall Progress</div>
        <div class="pct-big" id="pct-big">0%</div>
        <div class="pct-sub" id="pct-sub">0 of 43 modules complete</div>
        <div class="bar-wrap"><div class="bar-fill" id="bar-overall" style="width:0%"></div></div>
      </div>
      <div class="s-card">
        <div class="s-label">Competency Coverage</div>
        <div class="comp-list" id="comp-list"></div>
      </div>
      <div class="s-card">
        <div class="s-label">Readiness</div>
        <div class="readiness-label" id="readiness-label">Not Started</div>
        <div class="readiness-desc"  id="readiness-desc">Begin with any category to build momentum.</div>
      </div>
    </aside>
    <main id="main-area">
      <div class="filters"    id="filters"></div>
      <div id="module-list"></div>
    </main>
  </div>


  <div id="player-bar">
    <div class="pb-info">
      <div class="pb-pn"   id="pb-pn"></div>
      <div class="pb-name" id="pb-name"></div>
    </div>
    <div class="pb-controls">
      <button class="pb-btn pb-btn-main" id="pb-playbtn" onclick="togglePlayback()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
      </button>
    </div>
    <div class="pb-progress">
      <span class="pb-time" id="pb-cur">0:00</span>
      <input class="pb-seek" id="pb-seek" type="range" min="0" max="100" value="0"
             oninput="seekTo(this.value)" style="--prog:0%">
      <span class="pb-time right" id="pb-dur">0:00</span>
    </div>
    <button class="pb-close" onclick="stopPlayer()">&times;</button>
  </div>

</div><!-- /app -->

<!-- ── Weekly Summary Modal ─────────────────────────────── -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Weekly Summary</span>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body"><pre id="summary-pre"></pre></div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="copyToClipboard()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy to Clipboard
      </button>
    </div>
  </div>
</div>

<audio id="audio-player" preload="auto" style="display:none"></audio>
<div id="toast"></div>

const LS_KEY = 'nzrab-tracker-v1';
let activeCandidate = 'candidate_1';
let activeFilter    = 'all';
let state = loadState();

function loadState() {
  try {
    const p = JSON.parse(localStorage.getItem(LS_KEY));
    if (!p) return blank();
    return { candidate_1: { completed: new Set(p.candidate_1?.completed || []) }, candidate_2: { completed: new Set(p.candidate_2?.completed || []) } };
  } catch { return blank(); }
}
function blank()    { return { candidate_1: { completed: new Set() }, candidate_2: { completed: new Set() } }; }
function saveState(){ localStorage.setItem(LS_KEY, JSON.stringify({ candidate_1: { completed: [...state.candidate_1.completed] }, candidate_2: { completed: [...state.candidate_2.completed] } })); }

function pct(c) { return Math.round((state[c].completed.size / TOTAL) * 100); }

function competencyStats(c) {
  const done = state[c].completed;
  return COMPETENCIES.map(comp => {
    const catIds = CATEGORIES.filter(cat => cat.competency === comp.id).map(cat => cat.id);
    const total  = MODULES.filter(m => catIds.includes(m.categoryId)).length;
    const n      = MODULES.filter(m => catIds.includes(m.categoryId) && done.has(m.id)).length;
    return { ...comp, total, done: n, p: total ? Math.round((n / total) * 100) : 0 };
  });
}
function readinessFor(p) { let r = READINESS[0]; for (const x of READINESS) { if (p >= x[0]) r = x; } return r; }
function weakest(c)      { return competencyStats(c).reduce((a, b) => b.p < a.p ? b : a); }
function nextModules(c, n = 5) { const done = state[c].completed; return MODULES.filter(m => !done.has(m.id)).slice(0, n); }

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function renderAll() { renderTabs(); renderSidebar(); renderFilters(); renderModuleList(); }

function renderTabs() {
  for (const c of ['candidate_1', 'candidate_2']) {
    document.querySelector(`[data-c="${c}"]`).className = 'tab' + (c === activeCandidate ? ' active' : '');
    document.getElementById(`badge-${c}`).textContent  = pct(c) + '%';
  }
}

function renderSidebar() {
  const p = pct(activeCandidate), n = state[activeCandidate].completed.size;
  document.getElementById('pct-big').textContent     = p + '%';
  document.getElementById('pct-sub').textContent     = `${n} of ${TOTAL} modules complete`;
  document.getElementById('bar-overall').style.width = p + '%';
  const stats = competencyStats(activeCandidate);
  document.getElementById('comp-list').innerHTML = stats.map(s => `
    <div class="comp-item">
      <div class="comp-row-head"><span class="comp-name">${s.id}</span><span class="comp-frac">${s.done}/${s.total}</span></div>
      <div class="comp-bar-wrap"><div class="comp-bar-fill" style="width:${s.p}%;background:${s.colour}"></div></div>
    </div>`).join('');
  const [, label, desc] = readinessFor(p);
  document.getElementById('readiness-label').textContent = label;
  document.getElementById('readiness-desc').textContent  = desc;
}

function renderFilters() {
  const done = state[activeCandidate].completed, pending = TOTAL - done.size;
  const chips = [
    { id: 'all',       label: 'All',       count: TOTAL,     colour: null },
    { id: 'pending',   label: 'Pending',   count: pending,   colour: null },
    { id: 'completed', label: 'Completed', count: done.size, colour: null },
    ...CATEGORIES.map(c => ({ id: c.id, label: c.label, count: MODULES.filter(m => m.categoryId === c.id).length, colour: c.colour })),
  ];
  document.getElementById('filters').innerHTML = chips.map(ch => {
    const dot = ch.colour ? `<span class="chip-dot" style="background:${ch.colour}"></span>` : '';
    return `<button class="chip${ch.id === activeFilter ? ' active' : ''}" onclick="setFilter('${ch.id}')">${dot}${ch.label}<span class="chip-n">${ch.count}</span></button>`;
  }).join('');
}

function renderModuleList() {
  const done = state[activeCandidate].completed;
  const filtered = MODULES.filter(m => {
    if (activeFilter === 'completed') return done.has(m.id);
    if (activeFilter === 'pending')   return !done.has(m.id);
    if (activeFilter === 'all')       return true;
    return m.categoryId === activeFilter;
  });
  if (!filtered.length) { document.getElementById('module-list').innerHTML = `<div class="empty">No modules match this filter.</div>`; return; }

  const groups = new Map();
  for (const cat of CATEGORIES) groups.set(cat.id, []);
  for (const m of filtered) groups.get(m.categoryId).push(m);

  let i = 0;
  const html = [...groups.entries()].filter(([, ms]) => ms.length).map(([catId, mods]) => {
    const cat     = CATEGORIES.find(c => c.id === catId);
    const catDone = mods.filter(m => done.has(m.id)).length;
    const cards   = mods.map(m => {
      const isDone    = done.has(m.id);
      const isLoaded  = currentId === m.id;
      const isPlaying = isLoaded && !audio.paused;
      const noAudio   = driveReady && !driveFileMap[m.id];
      const playClass = `play-btn${isPlaying ? ' is-playing' : ''}${noAudio ? ' no-audio' : ''}`;
      const cardClass = `module-card${isDone ? ' done' : ''}${isLoaded ? ' now-playing' : ''}`;
      const playBtn   = driveReady
        ? `<button class="${playClass}" onclick="event.stopPropagation();playModule('${m.id}')" title="${noAudio ? 'No audio' : isPlaying ? 'Pause' : 'Play'}">${isPlaying ? SVG_PAUSE : SVG_PLAY}</button>`
        : '';
      return `<div class="${cardClass}" style="--delay:${i++ * 28}ms" onclick="toggleModule('${m.id}')" title="${m.name}">
        <div class="check-ring">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>
        </div>
        <div class="mod-info">
          <div class="mod-pn">${m.pn}</div>
          <div class="mod-name">${m.name}</div>
        </div>
        <div class="mod-meta">
          <span class="mod-dur">~${m.dur} min</span>
          ${playBtn}
          <span class="mod-cat-dot" style="background:${cat.colour}"></span>
        </div>
      </div>`;
    }).join('');
    return `<div class="module-group">
      <div class="group-head">
        <span class="group-dot" style="background:${cat.colour}"></span>
        <span class="group-name">${cat.label}</span>
        <span class="group-frac">${catDone}/${mods.length}</span>
      </div>
      ${cards}
    </div>`;
  }).join('');
  document.getElementById('module-list').innerHTML = html;
}

// ─────────────────────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────────────────────
function switchCandidate(c) { activeCandidate = c; renderAll(); }
function setFilter(f)       { activeFilter = f; renderFilters(); renderModuleList(); }

function toggleModule(id) {
  const set = state[activeCandidate].completed;
  if (set.has(id)) { set.delete(id); } else { set.add(id); }
  saveState();
  renderTabs(); renderSidebar(); renderFilters(); renderModuleList();
  const m = MODULES.find(m => m.id === id);
  showToast(set.has(id) ? `Marked complete: ${m.name}` : `Unmarked: ${m.name}`);
}

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// ─────────────────────────────────────────────────────────────
// WEEKLY SUMMARY
// ─────────────────────────────────────────────────────────────
function generateSummary() {
  const name  = activeCandidate === 'candidate_1' ? 'Candidate 1' : 'Candidate 2';
  const p     = pct(activeCandidate), n = state[activeCandidate].completed.size;
  const stats = competencyStats(activeCandidate), weak = weakest(activeCandidate), next5 = nextModules(activeCandidate, 5);
  const date  = new Date().toLocaleDateString('en-NZ', { day: 'numeric', month: 'long', year: 'numeric' });
  function bar(p) { const f = Math.round(p/10); return '\u2588'.repeat(f) + '\u2591'.repeat(10-f); }
  function rpad(s,n) { return s + ' '.repeat(Math.max(0, n - s.length)); }
  document.getElementById('summary-pre').textContent =
`NZRAB NPE \u2014 Weekly Summary
Candidate: ${name} | Date: ${date}

Overall Progress: ${n}/${TOTAL} (${p}%)

Competency Coverage:
${stats.map(s => `  ${rpad(s.id,26)} ${bar(s.p)} ${String(s.p).padStart(3)}%`).join('\n')}

\u26a0 Weakest area: ${weak.id} (${weak.p}%)

Next ${Math.min(5, next5.length)} modules to study:
${next5.length ? next5.map((m,i) => `  ${i+1}. ${m.pn} \u2014 ${m.name}`).join('\n') : '  (All modules complete!)'}

---
[STUDY] You are a study coach for the NZRAB NPE exam. I will give you practice note topics and you will quiz me, explain concepts, and help me identify gaps. Start with: ${next5.length ? next5[0].name : 'a final review of key topics'}`;
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
async function copyToClipboard() {
  try { await navigator.clipboard.writeText(document.getElementById('summary-pre').textContent); showToast('Copied to clipboard'); }
  catch { showToast('Copy failed — select all text and copy manually'); }
}

setInterval(saveState, 60_000);

// ─────────────────────────────────────────────────────────────
// AUDIO — Drive OAuth + Player
// ─────────────────────────────────────────────────────────────
let driveTokenClient = null;
let driveToken       = null;
let driveFileMap     = {};
let driveReady       = false;

const SVG_PLAY    = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>`;
const SVG_PAUSE   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
const SVG_PLAY_LG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>`;
const SVG_PAUSE_LG= `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;

const audio = document.getElementById('audio-player');
let currentId = null;

audio.addEventListener('timeupdate',     syncPlayerBar);
audio.addEventListener('loadedmetadata', syncPlayerBar);
audio.addEventListener('error', () => {
  const c = audio.error;
  showToast('Audio error ' + (c ? c.code + ': ' + c.message : 'unknown'));
  console.error('Audio element error:', c);
});
audio.addEventListener('play',  () => { syncPlayerBar(); renderModuleList(); });
audio.addEventListener('pause', () => { syncPlayerBar(); renderModuleList(); });
audio.addEventListener('ended', () => {
  currentId = null;
  document.getElementById('player-bar').style.display = 'none';
  renderModuleList();
});

function connectAudio() {
  if (!driveTokenClient) {
    driveTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/drive.readonly',
      callback: onDriveToken,
    });
  }
  driveTokenClient.requestAccessToken({ prompt: '' });
}

async function onDriveToken(resp) {
  if (resp.error) { showToast('Drive access denied'); return; }
  driveToken = resp.access_token;
  await loadDriveFiles();
  const btn = document.getElementById('btn-audio');
  btn.disabled = true;
  btn.style.opacity = '0.6';
  document.getElementById('btn-audio-label').textContent = 'Audio Ready';
  showToast('Audio connected');
  renderModuleList();
}

async function loadDriveFiles() {
  driveFileMap = {};
  let pageToken = '';
  const files   = [];
  do {
    const params = new URLSearchParams({
      q: `'${MP3_FOLDER_ID}' in parents and name contains '.mp3' and trashed=false`,
      fields: 'nextPageToken,files(id,name)',
      pageSize: '1000',
    });
    if (pageToken) params.set('pageToken', pageToken);
    const r    = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`, {
      headers: { Authorization: `Bearer ${driveToken}` },
    });
    const data = await r.json();
    if (data.files) files.push(...data.files);
    pageToken = data.nextPageToken || '';
  } while (pageToken);

  for (const m of MODULES) {
    const found = findFile(m.id, files);
    if (found) driveFileMap[m.id] = found.id;
  }
  driveReady = true;
}

function findFile(moduleId, files) {
  const re = /pn[_\-](\d+\.\d+[a-zA-Z]*)/i;

  // Special cases
  if (moduleId === 'ipenz22')
    return files.find(f => f.name.toLowerCase().includes('pn22')) || null;
  if (moduleId === 'ko_pn001')
    return files.find(f => { const n = f.name.toLowerCase(); return n.includes('ko') && n.includes('pn001'); }) || null;
  if (moduleId === 'ko_pn002')
    return files.find(f => { const n = f.name.toLowerCase(); return n.includes('ko') && n.includes('pn002'); }) || null;

  const target = moduleId.replace(/^pn_/, '').toLowerCase();

  // Pass 1: exact match
  let found = files.find(f => {
    const m = f.name.toLowerCase().match(re);
    return m && m[1].toLowerCase() === target;
  });
  if (found) return found;

  // Pass 2: prefix match for version-suffixed files (e.g. pn_1.101u)
  return files.find(f => {
    const m = f.name.toLowerCase().match(re);
    if (!m) return false;
    const cap = m[1].toLowerCase();
    return cap.startsWith(target) && /^[a-z]+$/.test(cap.slice(target.length));
  }) || null;
}

async function playModule(id) {
  if (!driveFileMap[id]) return;
  if (currentId === id) { togglePlayback(); return; }
  currentId = id;

  const m   = MODULES.find(x => x.id === id);
  const bar = document.getElementById('player-bar');
  bar.style.display = 'flex';
  document.getElementById('pb-pn').textContent   = m.pn;
  document.getElementById('pb-name').textContent = 'Loading…';
  renderModuleList();

  try {
    const resp = await fetch(
      `https://www.googleapis.com/drive/v3/files/${driveFileMap[id]}?alt=media`,
      { headers: { Authorization: `Bearer ${driveToken}` } }
    );
    if (!resp.ok) throw new Error(`Drive returned HTTP ${resp.status}`);
    const buf  = await resp.arrayBuffer();
    const blob = new Blob([buf], { type: 'audio/mpeg' });
    if (audio._blobUrl) URL.revokeObjectURL(audio._blobUrl);
    audio._blobUrl = URL.createObjectURL(blob);
    audio.src = audio._blobUrl;
    document.getElementById('pb-name').textContent = m.name;
    await audio.play();
    renderModuleList();
  } catch(e) {
    showToast('Error: ' + e.message);
    console.error('playModule error:', e);
    bar.style.display = 'none';
    currentId = null;
    renderModuleList();
  }
}

function togglePlayback() {
  if (audio.paused) { audio.play(); } else { audio.pause(); }
}

function seekTo(val) {
  if (audio.duration) audio.currentTime = (val / 100) * audio.duration;
}

function stopPlayer() {
  audio.pause();
  if (audio._blobUrl) { URL.revokeObjectURL(audio._blobUrl); audio._blobUrl = null; }
  audio.src = '';
  currentId = null;
  document.getElementById('player-bar').style.display = 'none';
  renderModuleList();
}

function syncPlayerBar() {
  const btn  = document.getElementById('pb-playbtn');
  if (btn)  btn.innerHTML = audio.paused ? SVG_PLAY_LG : SVG_PAUSE_LG;
  const prog = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  const seek = document.getElementById('pb-seek');
  if (seek) { seek.value = prog; seek.style.setProperty('--prog', prog + '%'); }
  const cur  = document.getElementById('pb-cur');
  const dur  = document.getElementById('pb-dur');
  if (cur) cur.textContent = fmtTime(audio.currentTime);
  if (dur) dur.textContent = fmtTime(audio.duration || 0);
}

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
renderAll();
</script>
